<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            width: 100%;
            font-family: 'Sarabun', sans-serif;
        }

        .btn-start:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 24px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            border: 3px solid #fff;
            outline: 1px solid #e0e0e0;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 4px solid #3498db;
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #34495e;
        }

        .progress-bar-bg {
            background-color: #e9ecef;
            border-radius: 4px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .timer-badge {
            font-size: 11px;
            background: #e8f4fd;
            color: #2471a3;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine</h1>
    <div class="subtitle">ระบบวิเคราะห์รูปภาพด้วย AI</div>
    
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เริ่มใช้งานกล้อง</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
        <span style="color: #95a5a6; font-size: 14px;">ยังไม่ได้เปิดกล้อง</span>
    </div>

    <div id="timer-status" class="timer-badge" style="display: none;">ระบบจะประมวลผลทุกๆ 5 วินาที</div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/u6TWVRucE/";
    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        // ซ่อนปุ่มเริ่มและแสดงสถานะเวลา
        document.getElementById("start-btn").style.display = "none";
        document.getElementById("timer-status").style.display = "inline-block";
        document.getElementById("webcam-container").innerHTML = "";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้อง (ปรับขนาดให้แสดงผลสวยงามขึ้นเป็น 250x250)
        const flip = true;
        webcam = new tmImage.Webcam(250, 250, flip);
        await webcam.setup();
        await webcam.play();
        
        // รัน loop เพื่อให้ภาพจากกล้องเคลื่อนไหวแบบ Real-time
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // สร้างโครงสร้างแถบแสดงผลดีไซน์ใหม่
        for (let i = 0; i < maxPredictions; i++) {
            const item = document.createElement("div");
            item.className = "prediction-item";
            
            item.innerHTML = `
                <div class="prediction-info">
                    <span class="class-name">กำลังโหลด...</span>
                    <span class="class-prob">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
            `;
            labelContainer.appendChild(item);
        }

        // เรียกประมวลผลครั้งแรกทันที
        await predict();

        // ตั้งเวลาให้สั่ง predict() ใหม่ทุกๆ 5000 มิลลิวินาที (5 วินาที)
        predictInterval = setInterval(predict, 5000);
    }

    async function loop() {
        webcam.update(); // อัปเดตเฟรมภาพของกล้องให้เคลื่อนไหวตลอดเวลา
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันทำนายผลที่จะถูกเรียกทุกๆ 5 วินาที
    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentage = (probability * 100).toFixed(0) + "%";
            
            const item = labelContainer.childNodes[i];
            
            // อัปเดตชื่อและเปอร์เซ็นต์
            item.querySelector(".class-name").innerText = className;
            item.querySelector(".class-prob").innerText = percentage;
            
            // อัปเดตความยาวของแถบ Progress Bar
            item.querySelector(".progress-bar-fill").style.width = percentage;
        }
    }
</script>

</body>
</html>
