<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mask Detection Model</title>
    <!-- โหลดฟอนต์เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .btn-start {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .btn-start:hover {
            background-color: #0056b3;
        }

        .btn-start:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .status {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
        }

        #webcam-container {
            margin: 0 auto 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            background-color: #e9ecef;
            border: 2px solid #dee2e6;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            background-color: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            border-left: 4px solid #007bff;
            font-size: 15px;
            font-weight: 600;
        }

        .class-name {
            color: #495057;
        }

        .probability {
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">Start</button>
    <div class="status" id="status">กดปุ่ม Start เพื่อเริ่มใช้งานกล้อง</div>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลหน้ากากอนามัยของคุณ[cite: 1]
    const URL = "https://teachablemachine.withgoogle.com/models/u6TWVRucE/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // ตัวแปรคุมเวลา

    async function init() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("status").innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]

        // โหลดโมเดล[cite: 1]
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้อง[cite: 1]
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(250, 250, flip);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]
        
        // ใส่แคนวาสกล้องเข้า UI[cite: 1]
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        
        // สร้างโครงสร้างข้อความผลลัพธ์แบบสวยงาม[cite: 1]
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const div = document.createElement("div");
            div.className = "prediction-item";
            div.innerHTML = `<span class="class-name">-</span><span class="probability">0.00</span>`;
            labelContainer.appendChild(div);[cite: 1]
        }

        document.getElementById("status").innerText = "ระบบกำลังประมวลผลทุกๆ 3 วินาที";
        
        // บันทึกเวลาเริ่มต้นและรันลูปกล้อง
        lastPredictTime = performance.now();
        window.requestAnimationFrame(loop);[cite: 1]
    }

    async function loop() {
        webcam.update(); // ภาพเคลื่อนไหวของกล้องจะอัปเดตตลอดเวลาให้ไหลลื่น[cite: 1]
        
        // เช็คว่าเวลาปัจจุบันผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) หรือยัง
        const currentTime = performance.now();
        if (currentTime - lastPredictTime >= 3000) {
            await predict(); // เรียกคำนวณผลลัพธ์[cite: 1]
            lastPredictTime = currentTime; // อัปเดตเวลาล่าสุด
        }

        window.requestAnimationFrame(loop);[cite: 1]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;[cite: 1]
            const probValue = prediction[i].probability.toFixed(2); // แสดงทศนิยม 2 ตำแหน่งแบบเดิมตามภาพ[cite: 1]
            
            // นำไปแสดงผลในกรอบที่จัดไว้
            const item = labelContainer.childNodes[i];
            item.querySelector(".class-name").innerText = className + ":";
            item.querySelector(".probability").innerText = probValue;
        }
    }
</script>
</body>
</html>
